# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: vst-ws-travel-buddy
services:
    proj-default:
        project: ""
        host: azure.ai.project
        language: ""
        endpoint: https://myresourcegroupforECTL.services.ai.azure.com/api/projects/proj-default
    vst-ws-travel-buddy:
        project: src/vst-ws-travel-buddy
        host: azure.ai.agent
        language: python
        uses:
            - proj-default
        codeConfiguration:
            dependencyResolution: remote_build
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: |
            TravelBuddy is an Agent Framework hosted agent with local Python function tools for weather, local time, and currency, plus a Foundry Toolbox that bundles web search, Code Interpreter, and the OctoTrip flights MCP server behind one project-managed endpoint.
        environmentVariables:
            - name: AZURE_AI_PROJECT_ENDPOINT
              value: ${AZURE_AI_PROJECT_ENDPOINT}
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: WORKSHOP_RESOURCE_PREFIX
              value: ${WORKSHOP_RESOURCE_PREFIX}
            - name: TOOLBOX_ENDPOINT
              value: ${TOOLBOX_ENDPOINT}
        kind: hosted
        metadata:
            tags:
                - Agent Framework
                - AI Agent Hosting
                - Azure AI AgentServer
                - Responses Protocol
                - Travel Assistant
                - Function Tools
                - MCP Tools
                - Toolbox Tools
            tool_declarations:
                - description: Returns mock destination weather for a city and optional date.
                  name: get_weather
                  parameters:
                    city: string
                    date: string | null
                - description: Returns the current local time for a destination city.
                  name: get_local_time
                  parameters:
                    city: string
                - description: Converts mock travel prices between USD, EUR, JPY, and GBP.
                  name: convert_currency
                  parameters:
                    amount: float
                    from_currency: string
                    to_currency: string
                - description: |
                    Foundry Toolbox bundling web_search, code_interpreter, and the OctoTrip flights MCP server, consumed from one project-managed endpoint.
                  endpoint: ${TOOLBOX_ENDPOINT}
                  name: travel-toolbox
                  type: toolbox
        name: vst-ws-travel-buddy
        protocols:
            - protocol: responses
              version: 2.0.0
infra:
    provider: microsoft.foundry
